<div class="flex-col gap-4 h-full">
  <div>
    <label for="name">Name: </label>
    <input type="text" name="name" id="name" [(ngModel)]="testSet.name" />
  </div>
  <div>
    <label for="description">Description: </label>
    <input
      type="text"
      name="description"
      id="description"
      [(ngModel)]="testSet.description"
    />
  </div>

  <hr />

  <div class="grow flex-col gap-4 pl-8">
    <app-testset-form-flows [flows]="testSet.flows"></app-testset-form-flows>
  </div>
</div>
