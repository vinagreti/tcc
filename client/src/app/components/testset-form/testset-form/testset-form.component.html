<div class="flex-col gap-8 h-full">
  <div>
    <input
      required
      type="text"
      name="name"
      id="name"
      placeholder="Name"
      title="Name"
      [(ngModel)]="testSet.name"
    />
  </div>
  <div>
    <input
      required
      type="text"
      name="description"
      id="description"
      placeholder="Description"
      title="Description"
      [(ngModel)]="testSet.description"
    />
  </div>

  <hr />

  <div class="grow flex-col gap-4">
    <app-testset-form-flows
      [flows]="testSet.flows"
      (save)="onSave($event)"
    ></app-testset-form-flows>
  </div>
</div>
